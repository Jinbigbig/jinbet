name: 每日赛程赔率自动更新

on:
  schedule:
    - cron: '15 4 * * *'
    - cron: '15 11 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取网易赔率并更新
        run: python update_odds_net.py --no-push
        env:
          PYTHONIOENCODING: utf-8

      - name: 生成版本号
        run: date '+%Y%m%d%H%M%S' > version.txt

      - name: 验证数据完整性（league 字段）
        run: |
          python3 -c "
          import json, sys
          with open('odds_data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          games = data.get('data', {})
          if not games:
              print('⚠️ 无比赛数据，跳过验证')
              sys.exit(0)
          empty = sum(1 for g in games.values() if not g.get('league'))
          total = len(games)
          ratio = empty / total
          print(f'联赛字段检查: {empty}/{total} 为空 ({ratio:.0%})')
          if ratio > 0.3:
              print('❌ 超过 30% 的比赛 league 字段为空，终止发布')
              sys.exit(1)
          print('✅ 数据完整性校验通过')
          "

      - name: 检查是否有更新
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 推送更新到 gh-pages
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 暂存本地修改，避免切换分支时冲突
          git stash push -m "auto-update-temp"

          git checkout gh-pages

          # 从 master 恢复最新文件到 gh-pages
          git checkout master -- index.html
          git checkout master -- odds_data.json
          git checkout master -- version.txt

          # 归档目录（如果 master 分支上存在）
          git checkout master -- odds_history/ 2>/dev/null || true

          git add index.html odds_data.json version.txt
          git add odds_history/ 2>/dev/null || true
          git commit -m "data: 自动更新赛程赔率 $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin gh-pages
