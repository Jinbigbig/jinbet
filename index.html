<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jinbet - 智能足球数据平台</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-card: #1e293b;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #22d3ee;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  header { text-align: center; padding: 60px 0 32px; }
  header h1 { font-size: 36px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header .sub { color: var(--text-muted); margin-top: 12px; font-size: 16px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 40px; }
  .btn {
    display: inline-block; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 600;
    text-decoration: none; transition: all .2s; border: none; cursor: pointer;
  }
  .btn-cyan { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0f172a; }
  .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(56,189,248,0.3); }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-outline:hover { background: rgba(56,189,248,0.1); }
  footer { text-align: center; padding: 60px 0 24px; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>jinbet</h1>
    <div class="sub">智能足球数据与预测分析平台</div>
  </header>
  <div class="btn-group">
    <a class="btn btn-outline" href="predictions/" target="_blank" style="text-decoration:none;">赔率管理</a>
    <a class="btn btn-cyan" href="predictions/" target="_blank" style="text-decoration:none;">🤖 AI预测报告</a>
  </div>
  <footer>
    <p>jinbet © 2026</p>
  </footer>
</div>
</body>
</html>
