<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 预测报告归档 | jinbet</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-card: #1e293b;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #22d3ee;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 24px; }
  header { text-align: center; padding: 40px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  header h1 { font-size: 24px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header .sub { color: var(--text-muted); margin-top: 8px; font-size: 14px; }
  .report-list { display: grid; gap: 16px; }
  .report-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    transition: all .2s; text-decoration: none; color: inherit;
  }
  .report-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .report-info h3 { font-size: 16px; margin-bottom: 4px; }
  .report-info p { font-size: 13px; color: var(--text-muted); }
  .report-meta { text-align: right; }
  .report-meta .badge {
    display: inline-block; background: rgba(56,189,248,0.1); color: var(--accent);
    padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }
  footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AI 足球预测报告归档</h1>
    <div class="sub">jinbet 竞彩足球每日深度分析</div>
  </header>
  <div class="report-list" id="report-list"></div>
  <footer>
    <p>jinbet AI 预测系统</p>
  </footer>
</div>
<script>
  var reports = [
    { date: '2026-07-22', weekday: '周三', matches: 4, leagues: '韩职 x3 / 欧冠 x1' }
  ];
  var list = document.getElementById('report-list');
  reports.forEach(function(r) {
    var card = document.createElement('a');
    card.className = 'report-card';
    card.href = r.date + '/index.html';
    card.innerHTML = '<div class="report-info"><h3>' + r.date + ' ' + r.weekday + '</h3><p>' + r.matches + ' 场比赛 · ' + r.leagues + '</p></div><div class="report-meta"><span class="badge">查看报告</span></div>';
    list.appendChild(card);
  });
</script>
</body>
</html>
